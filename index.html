<!DOCTYPE html>
<html>
<head>
    <title>Simple Randomizer</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
            background-color: #f4f4f4;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        #result {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>🎲 Random Name Picker</h1>
    <button onclick="randomPick()">Pick a Random Name</button>

    <div id="result"></div>

    <script>
        function randomPick() {
            var names = ["John", "Anna", "Mark", "Lisa", "David"];
            var randomIndex = Math.floor(Math.random() * names.length);
            document.getElementById("result").innerHTML = names[randomIndex];
        }
    </script>

</body>
</html>
