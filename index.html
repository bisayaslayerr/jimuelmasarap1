<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Crush Mo Rin Ba Ako? 😳</title>
  <style>
    body {
      background-color: #ffe6f0;
      font-family: 'Arial', sans-serif;
      text-align: center;
      padding-top: 100px;
      color: #d6336c;
    }
    h1 {
      font-size: 36px;
      margin-bottom: 40px;
    }
    button {
      padding: 15px 35px;
      font-size: 20px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .yes {
      background-color: #d6336c;
      color: white;
      margin: 0 20px;
    }
    .no {
      background-color: #999;
      color: white;
      position: absolute;
    }
    #message {
      margin-top: 50px;
      font-size: 22px;
      font-weight: bold;
      min-height: 40px;
    }
  </style>
</head>
<body>

  <h1>Crush mo rin ba ako?</h1>

  <button class="yes" onclick="sayYes()">Oo 😍</button>
  <button class="no" onmouseover="moveNo()">Hinde 😅</button>

  <div id="message"></div>

  <script>
    function sayYes() {
      document.getElementById('message').textContent = "Yay! Alam ko na, sweet tayo 🥰";
    }

    function moveNo() {
      const button = document.querySelector('.no');
      const x = Math.random() * (window.innerWidth - 100);
      const y = Math.random() * (window.innerHeight - 50);
      button.style.left = x + 'px';
      button.style.top = y + 'px';
    }

    // Optional: Make "No" button not reachable on small screens
    window.addEventListener('resize', moveNo);
  </script>

</body>
</html>
